{% extends "employee_layout.html" %}

{% block content %}
<div class="mb-4">
    <h2 class="fw-bold text-dark"><i class="bi bi-card-list text-primary me-2"></i> My Work Logs</h2>
    <p class="text-muted">Review your past submissions.</p>
</div>

<div class="card shadow-sm border-0 overflow-hidden">
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
            <thead class="bg-light">
                <tr>
                    <th class="py-3 px-4 text-uppercase text-muted small fw-bold" style="width: 20%;">Date</th>
                    <th class="py-3 px-4 text-uppercase text-muted small fw-bold">Work Submitted</th>
                </tr>
            </thead>
            <tbody>
                {% for log in logs %}
                <tr>
                    <td class="py-3 px-4 align-top">
                        <div class="fw-bold text-dark">{{ log.date }}</div>
                        <div class="text-muted small mt-1"><i class="bi bi-clock me-1"></i>{{ log.time }}</div>
                    </td>
                    <td class="py-3 px-4 text-dark align-top" style="white-space: pre-wrap;">{{ log.work }}</td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="2" class="text-center py-5 text-muted">No work logs submitted yet.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
