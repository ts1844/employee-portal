<!DOCTYPE html>
<html>
<head>
    <title>Employee Portal - Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        .login-box {
            width: 350px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            color: white;
        }
        .login-box input {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
        }
        .login-box input::placeholder {
            color: #ddd;
        }
        .login-logo {
            width: 100px;
            height: 100px;
            object-fit: contain;
            display: block;
            margin: 0 auto 15px auto;
            background: white; /* Adds a white background if your logo is dark */
            border-radius: 50%; /* Makes it circular */
            padding: 10px;
        }
    </style>
</head>
<body>

<div class="login-box">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="Company Logo" class="login-logo">
    
    <h3 class="text-center mb-4">Employee Portal</h3>

    {% if error %}
        <div class="alert alert-danger text-center">{{error}}</div>
    {% endif %}

    <form method="POST">
        <input name="email" class="form-control mb-3" placeholder="Email" required>
        <input name="password" type="password" class="form-control mb-3" placeholder="Password" required>
        <button class="btn btn-light w-100 fw-bold">Login</button>
    </form>
</div>

</body>
</html>
