{% extends "employee_layout.html" %}

{% block content %}
<div class="mb-4 d-flex justify-content-between align-items-center">
    <div>
        <h2 class="fw-bold text-dark"><i class="bi bi-calendar-check text-success me-2"></i> My Attendance Calendar</h2>
        <p class="text-muted">A visual record of your daily clock-ins.</p>
    </div>
</div>

<div class="card p-4 shadow-sm border-0" style="border-radius: 16px;">
    <div id="calendar"></div>
</div>

<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');
    
    var calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: 'dayGridMonth',
      themeSystem: 'bootstrap5',
      headerToolbar: {
        left: 'prev,next today',
        center: 'title',
        right: 'dayGridMonth,timeGridWeek'
      },
      events: [
        {% for r in records %}
        {
          title: 'Punched In',
          start: '{{ r.iso_start }}', 
          color: '#10b981', /* Professional green for success */
          textColor: '#ffffff',
          allDay: false
        }{% if not loop.last %},{% endif %}
        {% endfor %}
      ]
    });
    
    calendar.render();
  });
</script>
{% endblock %}
