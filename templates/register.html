{% extends "layout.html" %}

{% block content %}
<div class="mb-5">
    <h2 class="fw-bold text-dark"><i class="bi bi-person-plus-fill text-primary me-2"></i> Onboard New Employee</h2>
    <p class="text-muted fs-6">Create a new secure account for team members.</p>
</div>

<div class="card p-5 shadow-sm border-0" style="max-width: 600px;">
    <form method="POST">
        
        <div class="mb-4">
            <label class="form-label fw-bold text-dark mb-2">Full Name</label>
            <div class="input-group">
                <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                <input name="name" class="form-control form-control-lg bg-light border-start-0 ps-0" placeholder="e.g. Jane Doe" required>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label fw-bold text-dark mb-2">Email Address</label>
            <div class="input-group">
                <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                <input name="email" type="email" class="form-control form-control-lg bg-light border-start-0 ps-0" placeholder="jane.doe@company.com" required>
            </div>
        </div>

        <div class="mb-5">
            <label class="form-label fw-bold text-dark mb-2">Temporary Password</label>
            <div class="input-group">
                <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                <input name="password" type="password" class="form-control form-control-lg bg-light border-start-0 ps-0" placeholder="Create a secure password" required>
            </div>
            <div class="form-text mt-2"><i class="bi bi-shield-lock me-1"></i> Password will be automatically encrypted and hashed in the database.</div>
        </div>

        <div class="d-flex justify-content-between align-items-center pt-3 border-top mt-4">
            <a href="/admin" class="text-decoration-none text-muted fw-bold"><i class="bi bi-x-circle me-1"></i> Cancel</a>
            <button class="btn btn-primary btn-lg rounded-pill px-5 shadow-sm fw-bold">
                Create Account <i class="bi bi-check2-circle ms-2"></i>
            </button>
        </div>

    </form>
</div>
{% endblock %}
